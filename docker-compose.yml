services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # HTTP → redirect a HTTPS
      - "traefik.http.routers.ppa-http.rule=Host(`plires.cloud`)"
      - "traefik.http.routers.ppa-http.entrypoints=web"
      - "traefik.http.routers.ppa-http.middlewares=ppa-https-redirect"
      - "traefik.http.middlewares.ppa-https-redirect.redirectscheme.scheme=https"
      # HTTPS
      - "traefik.http.routers.ppa-https.rule=Host(`plires.cloud`)"
      - "traefik.http.routers.ppa-https.entrypoints=websecure"
      - "traefik.http.routers.ppa-https.tls=true"
      - "traefik.http.routers.ppa-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.ppa-app.loadbalancer.server.port=80"
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      ASSET_URL: ${ASSET_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    volumes:
      - ppa_storage:/var/www/html/storage

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ppa_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ppa_mysql:
  ppa_storage:

networks:
  dokploy-network:
    external: true
